spring:
  application:
    name: inu-teamflow-server

  config:
    import: optional:file:.env[.properties]

  datasource:
    url: ${POSTGRESQL_URL}
    username: ${POSTGRESQL_USERNAME}
    password: ${POSTGRESQL_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET}

aws:
  credentials:
    access-key: ${AWS_ACCESS_KEY_ID}
    secret-key: ${AWS_SECRET_ACCESS_KEY}

  region:
    static: ${AWS_REGION}

  s3:
    bucket: ${S3_BUCKET_NAME}

  cloudfront:
    domain: ${CLOUDFRONT_DOMAIN}
