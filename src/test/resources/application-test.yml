spring:
  config:
    import: optional:file:.env[.properties]

  datasource:
    url: jdbc:h2:mem:inu_teamflow_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    open-in-view: false
    show-sql: false

jwt:
  secret: ${JWT_SECRET}

aws:
  credentials:
    access-key: test-access-key
    secret-key: test-secret-key
  region:
    static: ap-northeast-2
  s3:
    bucket: test-bucket
  cloudfront:
    domain: test.cloudfront.net
